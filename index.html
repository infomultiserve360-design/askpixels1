<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK Pixels Wedding Photography</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>ASK Pixels</h1>
        <p>Your Story, Captured Perfectly</p>
        <nav>
            <ul>
                <li><a href="#about">About Us</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="about">
        <h2>About Us</h2>
        <p>We are a passionate team dedicated to capturing the most beautiful moments of your special day.</p>
    </section>
    <section id="portfolio">
        <h2>Our Portfolio</h2>
        <p>Check out some of our amazing work.</p>
        <div class="gallery">
            <img src="image1.jpg" alt="Wedding Image 1">
            <img src="image2.jpg" alt="Wedding Image 2">
            <img src="image3.jpg" alt="Wedding Image 3">
        </div>
    </section>
    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 ASK Pixels. All rights reserved.</p>
    </footer>
</body>
</html>
